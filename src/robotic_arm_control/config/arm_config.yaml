# 六轴机械臂D-H参数（mm/度）
DH_PARAMS:
  joint1: {a: 0, alpha: 90, d: 100, theta: 0}
  joint2: {a: 200, alpha: 0, d: 0, theta: 0}
  joint3: {a: 180, alpha: 0, d: 0, theta: 0}
  joint4: {a: 0, alpha: 90, d: 150, theta: 0}
  joint5: {a: 0, alpha: -90, d: 0, theta: 0}
  joint6: {a: 0, alpha: 0, d: 50, theta: 0}

# 关节限位（度）
JOINT_LIMITS:
  joint1: [-180, 180]
  joint2: [-90, 90]
  joint3: [-90, 90]
  joint4: [-180, 180]
  joint5: [-90, 90]
  joint6: [-360, 360]